<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Calculator</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    text-align:center;
    color:white;
}

.container{
    width:350px;
    margin:auto;
    margin-top:80px;
    background:white;
    color:black;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.3);
}

input{
    padding:8px;
    width:200px;
    margin:10px;
    border-radius:5px;
    border:1px solid gray;
}

button{
  margin:5px;
    padding:10px 20px;
    background:khaki;
    color:rgb(14, 13, 13);
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:rgb(169, 169, 233);
}

#result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🎓 Grade Calculator</h1>

<div class="container">

<label>Enter Number of Subjects</label><br>
<input type="number" id="subjects"><br>

<button onclick="generateInputs()">Enter Marks</button>

<div id="marksInput"></div>

<button onclick="calculateResult()">Calculate Result</button>

<div id="result"></div>

</div>

<script>

function generateInputs(){
    let n = document.getElementById("subjects").value;
    let container = document.getElementById("marksInput");
    container.innerHTML = "";

    for(let i=1;i<=n;i++){
        container.innerHTML += 
        `<input type="number" placeholder="Marks of Subject ${i}" class="marks"><br>`;
    }
}

function calculateResult(){
    let marks = document.getElementsByClassName("marks");
    let total = 0;

    for(let m of marks){
        total += Number(m.value);
    }

    let avg = total / marks.length;
    let grade;

    if(avg >= 90) grade = "A+";
    else if(avg >= 75) grade = "A";
    else if(avg >= 60) grade = "B";
    else if(avg >= 50) grade = "C";
    else grade = "Fail";

    document.getElementById("result").innerHTML =
        `Total = ${total} <br> Average = ${avg.toFixed(2)} <br> Grade = ${grade}`;
}

</script>

</body>
</html>
